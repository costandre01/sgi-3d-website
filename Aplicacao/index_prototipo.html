<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Disco (3D) – Mini Loja</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-100">
  <header class="border-b border-slate-800 bg-slate-900/70 backdrop-blur">
    <div class="mx-auto max-w-6xl px-4 py-4 flex items-center justify-between gap-4">
      <a href="./index.html" class="flex items-center gap-3 hover:opacity-90">
        <div class="h-9 w-9 rounded-xl bg-slate-800 grid place-items-center font-semibold">ML</div>
        <div class="leading-tight">
          <div class="font-semibold tracking-wide">Mini Loja</div>
          <div class="text-xs text-slate-400">Voltar ao catálogo</div>
        </div>
      </a>

      <div class="flex items-center gap-2">
        <span class="text-sm text-slate-400 hidden sm:inline">Produto:</span>
        <span class="text-sm font-semibold">Disco (3D)</span>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-8 grid grid-cols-1 lg:grid-cols-5 gap-6">
    <!-- Painel 3D -->
    <section class="lg:col-span-3">
      <div class="rounded-2xl border border-slate-800 bg-slate-900/40 overflow-hidden shadow-[0_18px_40px_rgba(15,23,42,0.8)]">
        <div id="turntable-3d" class="h-[420px] w-full bg-[radial-gradient(circle_at_50%_0,#1e293b,#020617)]"></div>

        <div class="border-t border-slate-800 p-3 flex flex-wrap items-center justify-center gap-2">
          <button id="btn-open"
                  class="px-3 py-1.5 rounded-full border border-slate-700 bg-slate-950/60 text-sm hover:bg-slate-800">
            Abrir tampa
          </button>
          <button id="btn-close"
                  class="px-3 py-1.5 rounded-full border border-slate-700 bg-slate-950/60 text-sm hover:bg-slate-800">
            Fechar tampa
          </button>
          <button id="btn-play"
                  class="px-3 py-1.5 rounded-full border border-slate-700 bg-slate-950/60 text-sm hover:bg-slate-800">
            Rodar disco
          </button>
          <button id="btn-stop"
                  class="px-3 py-1.5 rounded-full border border-slate-700 bg-slate-950/60 text-sm hover:bg-slate-800">
            Parar disco
          </button>
          <button id="btn-swap" class="px-3 py-1.5 rounded-full border border-slate-700 bg-slate-950/60 text-sm hover:bg-slate-800">Trocar disco</button>
          <label class="flex items-center gap-2 text-xs text-slate-300">
            Volume
            <input id="volume" type="range" min="0" max="100" value="60"
                  class="w-40 accent-slate-200" />
          </label>


          <span class="text-xs text-slate-400 ml-2">Rato: rodar e zoom</span>
        </div>
      </div>
    </section>

    <!-- Info do produto -->
    <aside class="lg:col-span-2">
      <div class="rounded-2xl border border-slate-800 bg-slate-900/40 p-5">
        <h1 class="text-xl font-semibold">Disco (3D)</h1>
        <p class="mt-2 text-sm text-slate-400">
          Demonstração de interação Three.js com modelo GLB, OrbitControls e áudio.
        </p>

        <div class="mt-4 flex items-end justify-between">
          <div>
            <div class="text-sm text-slate-400">Preço</div>
            <div class="text-2xl font-semibold">€ 49,90</div>
          </div>
          <button class="rounded-xl bg-slate-100 text-slate-900 px-4 py-2 text-sm font-medium hover:bg-white">
            Adicionar (mock)
          </button>
        </div>

        <div class="mt-6 space-y-2 text-sm text-slate-300">
          <div class="flex justify-between gap-3">
            <span class="text-slate-400">Categoria</span>
            <span>Áudio</span>
          </div>
          <div class="flex justify-between gap-3">
            <span class="text-slate-400">Tecnologia</span>
            <span>Three.js / GLTF</span>
          </div>
          <div class="flex justify-between gap-3">
            <span class="text-slate-400">Estado</span>
            <span>Demo</span>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <!-- es-module-shims + importmap (como tinhas) -->
  <!-- <script async src="../../node_modules/es-module-shims/dist/es-module-shims.js"></script> -->

    <script type="importmap">
      {
        "imports": {
          "three": "./node_modules/three/build/three.module.js",
          "three/addons/": "./node_modules/three/examples/jsm/"
        }
      }
    </script>

  <script type="module" src="assets/main.js"></script>
</body>
</html>
